schema:
  - api/graphql/schema/*.graphql

exec:
  filename: api/graphql/generated/generated.go
  package: generated

model:
  filename: api/graphql/generated/models_gen.go
  package: generated

resolver:
  layout: follow-schema
  dir: internal/presentation/graphql/resolver
  package: resolver
  filename_template: "{name}.resolvers.go"

models:
  Time:
    model: github.com/99designs/gqlgen/graphql.Time
  Comment:
    fields:
      replies:
        resolver: true
