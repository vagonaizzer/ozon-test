server:
  host: "0.0.0.0"
  port: 8080

# Выбор хранилища: "memory" или "postgres"
storage:
  type: "memory"   # Допустимые значения: memory, postgres
  postgres:
    host: "localhost"
    port: 5432
    user: "username"
    password: "secret"
    dbname: "dbname"
    sslmode: "disable"

logger:
  level: "debug"   # debug / info / warn / error
  env: "dev"       # dev / prod
